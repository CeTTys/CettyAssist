name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build addon package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-manual}"
          mkdir -p dist/CeTTyAssist

          cp CeTTyAssist.toc dist/CeTTyAssist/
          cp Core.lua Engine.lua Slash.lua State.lua UI.lua README.md Profiles.lua dist/CeTTyAssist/
          cp -R Media dist/CeTTyAssist/

          cd dist
          zip -r "CeTTyAssist-${VERSION}.zip" CeTTyAssist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CeTTyAssist-*.zip
          generate_release_notes: true